baseURL: 'https://202kk.github.io/'
languageCode: ko-kr
title: Hyunjoon Kim's github.io
theme: PaperMod
# Copyright: 'Copyright (c) 2023'
params:
  env: production
  defaultTheme: auto
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowToc: true
  profileMode:
    enabled: true
    Title: "Hi there 🖐️"
    imageUrl: "my face.png"
    imageTitle: my face image
    imageWidth: 150
    imageHeight: 150
    subtitle: This is subtitle
  socialIcons:
    - name: github
      url: 'https://github.com/202kk'
    - name: linkedin
      url: 'https://www.linkedin.com/in/hyunjoon-kim-3226a0291/'
    - name: cv
      url: 'https://www.linkedin.com/in/hyunjoon-kim-3226a0291/'

label:
  - text: 'home'
    
menu:
  main:
    - identifier: archives
      name: archives
      url: /archives/
    - identifier: posts
      name: posts
      url: /posts/
    - identifier: publications
      name: publications
      url: /publications/
    - identifier: search
      name: search
      url: /search/


outputs:
  home:
    - HTML
    - RSS
    - JSON
